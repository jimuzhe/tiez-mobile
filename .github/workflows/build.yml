name: Build App
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-android:
    name: 🤖 Build Android (Optimized arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕️ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies & Clean Native
        run: |
          rm -rf android ios
          npm install

      - name: 🚀 Build Android (arm64-v8a Only)
        # 强制输出到当前目录
        run: |
          eas build --platform android --profile preview --local --non-interactive --output=./TieZ-Android-arm64.apk

      - name: 📤 Upload Optimized APK
        uses: actions/upload-artifact@v4
        with:
          name: TieZ-Android-arm64-Optimized
          path: TieZ-Android-arm64.apk
          retention-days: 7
