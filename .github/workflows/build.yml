name: Build App
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-android:
    name: 🤖 Build Android (Split & Universal)
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕️ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠 Prebuild & Inject ABI Split Config
        run: |
          # 1. 生成原生目录
          npx expo prebuild --platform android --no-install
          
          # 2. 注入开启混淆和压缩
          sed -i 's/def enableMinifyInReleaseBuilds = false/def enableMinifyInReleaseBuilds = true/g' android/app/build.gradle
          sed -i 's/def enableShrinkResourcesInReleaseBuilds = false/def enableShrinkResourcesInReleaseBuilds = true/g' android/app/build.gradle
          
          # 3. 注入 ABI Split 配置
          # 在 android { ... } 内部插入分包逻辑
          sed -i '/android {/a \    splits { abi { enable true; reset(); include "armeabi-v7a", "arm64-v8a", "x86_64"; universalApk true } }' android/app/build.gradle

      - name: 🚀 Build APKs
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          
          # 提取我们要的两个关键包
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk ../TieZ-ARM64.apk
          cp app/build/outputs/apk/release/app-universal-release.apk ../TieZ-Universal.apk

      - name: 📤 Upload Optimized APKs
        uses: actions/upload-artifact@v4
        with:
          name: TieZ-Android-Packages
          path: |
            TieZ-ARM64.apk
            TieZ-Universal.apk
          retention-days: 7
