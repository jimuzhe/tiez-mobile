name: Build App
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-android:
    name: 🤖 Build Android (Local on GitHub)
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕️ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build Android locally
        # 使用 --local 在 GitHub 虚拟机内编译 APK，支持 ABI 分包
        run: |
          eas build --platform android --profile preview --local --non-interactive

      - name: 📤 Upload APK Artifacts
        # 自动搜寻并上传所有生成的 APK (如 arm64-v8a 等不同架构版本)
        uses: actions/upload-artifact@v4
        with:
          name: tiez-android-apks
          path: "*.apk"
          retention-days: 7
